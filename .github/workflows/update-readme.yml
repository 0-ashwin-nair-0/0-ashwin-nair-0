name: Update README with Latest Projects

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger manually from GitHub UI

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch latest repos and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Fetch your 3 most recently pushed public repos (excluding the profile repo itself)
            const { data: repos } = await github.rest.repos.listForUser({
              username: '0-ashwin-nair-0',
              sort: 'pushed',
              direction: 'desc',
              per_page: 10,
              type: 'public'
            });

            const filtered = repos
              .filter(r => !r.fork && r.name !== '0-ashwin-nair-0')
              .slice(0, 3);

            // Build the markdown block
            const rows = filtered.map(repo => {
              const lang = repo.language || 'N/A';
              const desc = repo.description || 'No description yet.';
              const url  = repo.html_url;
              const name = repo.name;
              const stars = repo.stargazers_count;
              return `| 🔗 [**${name}**](${url}) | \`${lang}\` | ${desc} | ⭐ ${stars} |`;
            });

            const table = [
              '| Project | Language | Description | Stars |',
              '|---------|----------|-------------|-------|',
              ...rows
            ].join('\n');

            const block = `<!-- PROJECTS:START -->\n${table}\n<!-- PROJECTS:END -->`;

            // Read README and replace the section
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- PROJECTS:START -->[\s\S]*?<!-- PROJECTS:END -->/,
              block
            );

            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update latest projects"
          git push
